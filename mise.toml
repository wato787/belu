[tools]
bun = "1.3.14"
node = "26.4.0"
wrangler = "4.107.0"

[tasks.dev]
description = "Start all apps"
run = 'bun --filter "*" dev'

[tasks.dev-web]
description = "Start the web app"
run = "bun --filter @belu/web dev"

[tasks.dev-api]
description = "Start the API worker"
run = "bun --filter @belu/api dev"

[tasks.build-api]
description = "Build the API worker artifact"
run = "bun --filter @belu/api build"

[tasks.build-web]
description = "Build the web app artifact"
run = "bun --filter @belu/web build"

[tasks.build]
description = "Build deploy artifacts"
depends = ["build-api", "build-web"]

[tasks.check]
description = "Run lint, typecheck, and format check"
depends = ["lint", "typecheck", "format-check"]

[tasks.lint]
description = "Lint the repository"
run = "bunx oxlint ."

[tasks.format]
description = "Format the repository"
run = "bunx oxfmt ."

[tasks.format-check]
description = "Check formatting"
run = "bunx oxfmt --check ."

[tasks.typecheck]
description = "Typecheck all apps"
run = 'bun --filter "*" typecheck'

[tasks.auth-generate-schema-api]
description = "Generate Better Auth schema for the API"
run = "bun --filter @belu/api auth:generate-schema"

[tasks.db-generate-api]
description = "Generate API database migrations"
run = "bun --filter @belu/api db:generate"

[tasks.db-migrate-local-api]
description = "Apply API database migrations to local D1"
run = "bun --filter @belu/api db:migrate:local"

[tasks.db-migrate-dev-api]
description = "Apply API database migrations to dev D1"
run = "bun --filter @belu/api db:migrate:dev"

[tasks.infra-init-dev]
description = "Initialize dev Terraform"
run = "terraform -chdir=infra/terraform/environments/dev init"

[tasks.infra-plan-dev]
description = "Plan dev infrastructure changes"
depends = ["build", "infra-init-dev"]
run = "terraform -chdir=infra/terraform/environments/dev plan"

[tasks.infra-apply-dev]
description = "Apply dev infrastructure changes"
depends = ["build", "infra-init-dev"]
run = "terraform -chdir=infra/terraform/environments/dev apply"

[tasks.infra-apply-dev-auto]
description = "Apply dev infrastructure changes without an interactive approval"
depends = ["build", "infra-init-dev"]
run = "terraform -chdir=infra/terraform/environments/dev apply -auto-approve"

[tasks.deploy-dev]
description = "Build, apply dev infrastructure, then run dev D1 migrations"
depends = ["infra-apply-dev-auto"]
run = "mise run db-migrate-dev-api"
